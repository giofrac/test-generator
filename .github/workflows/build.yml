name: Build and Test

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master, develop ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        java-version: ['17', '21']

    steps:
    - uses: actions/checkout@v3

    - name: Set up JDK ${{ matrix.java-version }}
      uses: actions/setup-java@v3
      with:
        java-version: ${{ matrix.java-version }}
        distribution: 'temurin'
        cache: gradle

    - name: Build with Gradle
      run: ./gradlew build -q

    - name: Run tests
      run: ./gradlew test -q

    - name: Test CLI
      run: |
        ./testgen.sh --help
        ./testgen.sh src/main/java/com/giofrac/Calculator.java --method somma

